name: Release and Deploy
on:
  release:
    types: [ published ]
jobs:
  deploy-production-us:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "corretto"
          cache: "maven"
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - name: Configure AWS credentials
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_PROD_ACCOUNT_ID }}:role/scanii-guarana-gha
          role-session-name: gha-scanii-guarana-release
          aws-region: us-east-1

      - name: Derive version
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION=${TAG#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set pom version
        run: mvn -q versions:set -DnewVersion="${{ steps.version.outputs.version }}" -DgenerateBackupPoms=false

      - name: Build and package
        run: make build package

      - name: Publish to Serverless Application Repository
        env:
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
          AWS_DEFAULT_REGION: us-east-1
          SAM_CLI_TELEMETRY: 0
          ACCOUNT_ID: ${{ steps.aws-creds.outputs.aws-account-id }}
          APPLICATION: uvasoftware-guarana
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          aws serverlessrepo create-application-version \
            --application-id "arn:aws:serverlessrepo:us-east-1:${ACCOUNT_ID}:applications/${APPLICATION}" \
            --semantic-version "${VERSION}" \
            --source-code-url "https://github.com/scanii/guarana/releases/tag/v${VERSION}" \
            --template-body file://guarana.yaml >/dev/null
          echo "SAM application ${APPLICATION} version ${VERSION} published!"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" guarana.yaml target/guarana.jar --clobber
